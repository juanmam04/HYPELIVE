name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build web
        run: pnpm exec turbo run build --filter=@hypelive/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: public-anon-key-for-ci

      - name: Validate mobile package
        run: pnpm exec turbo run typecheck lint --filter=@hypelive/mobile

      - name: Validate TV package
        run: pnpm exec turbo run typecheck lint --filter=@hypelive/tv

      # Native iOS/Android/tvOS builds require macOS runners, signing, and
      # platform SDKs. Documented as out of CI scope for Phase 0.
